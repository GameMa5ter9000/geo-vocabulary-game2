<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sort the Words — Geography Vocab</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0ede6;
  --surface: #faf8f4;
  --border: #d8d0c4;
  --text: #1a1610;
  --muted: #7a7165;
  --elba-color: #0077b6;
  --shet-color: #4a7c59;
  --correct: #2d6a4f;
  --correct-bg: #d8f3dc;
  --wrong: #c1121f;
  --wrong-bg: #ffe5e5;
  --neutral: #e8e2d8;
  --chip-bg: #1a1610;
  --chip-text: #f0ede6;
  --shadow: 0 2px 12px rgba(0,0,0,.1);
  --shadow-lift: 0 8px 30px rgba(0,0,0,.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Instrument Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  background: var(--text);
  color: var(--bg);
  padding: 1rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
  gap: 1rem; flex-wrap: wrap;
}
header h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  font-weight: 800; letter-spacing: -0.5px;
}
.progress-info {
  display: flex; gap: 1.5rem; align-items: center;
}
.prog-chip {
  background: rgba(255,255,255,.12);
  border-radius: 8px; padding: .35rem .9rem;
  font-size: .85rem; font-weight: 600; letter-spacing: .5px;
}
#progressText { color: #a8d8b0; }
#scoreText { color: #ffc97a; }

/* ── MAIN LAYOUT ── */
.arena {
  display: grid;
  grid-template-columns: 1fr minmax(180px,220px) 1fr;
  grid-template-rows: auto auto;
  gap: 0;
  min-height: calc(100vh - 60px);
}

/* ── COLUMNS ── */
.col {
  display: flex; flex-direction: column;
  padding: 1.2rem;
  gap: 1rem;
}
.col-left  { border-right: 1px solid var(--border); }
.col-right { border-left:  1px solid var(--border); }

/* ── IMAGE CARD ── */
.img-card {
  border-radius: 14px; overflow: hidden;
  box-shadow: var(--shadow);
  position: relative; flex-shrink: 0;
  aspect-ratio: 4/3;
  border: 2px solid var(--border);
}
.img-card img { width:100%; height:100%; object-fit: cover; display:block; }
.img-badge {
  position: absolute; top: 10px; left: 10px;
  border-radius: 8px; padding: .3rem .8rem;
  font-family: 'Syne', sans-serif; font-size: .75rem;
  font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  backdrop-filter: blur(8px);
}
.img-badge.elba { background: rgba(0,119,182,.85); color: #fff; }
.img-badge.shet { background: rgba(74,124,89,.85); color: #fff; }

/* ── DROP ZONES ── */
.drop-label {
  font-family: 'Syne', sans-serif;
  font-size: .7rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  padding: .4rem .8rem; border-radius: 6px; display: inline-block;
  margin-bottom: .3rem;
}
.drop-label.elba { background: var(--elba-color); color: #fff; }
.drop-label.shet { background: var(--shet-color); color: #fff; }
.drop-label.both { background: var(--text); color: var(--bg); }

.drop-zone {
  flex: 1;
  min-height: 100px;
  border-radius: 14px;
  border: 2.5px dashed var(--border);
  background: var(--surface);
  padding: .8rem;
  display: flex; flex-wrap: wrap;
  align-content: flex-start;
  gap: .5rem;
  transition: border-color .2s, background .2s;
  position: relative;
}
.drop-zone.drag-over {
  border-color: var(--text);
  background: #e8e2d8;
}
.drop-zone.elba-zone.drag-over { border-color: var(--elba-color); background: #e8f4fd; }
.drop-zone.shet-zone.drag-over { border-color: var(--shet-color); background: #eaf4ee; }

.drop-hint {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--border); font-size: .8rem; pointer-events: none;
  font-style: italic;
}

/* ── CENTER COLUMN ── */
.col-center {
  display: flex; flex-direction: column;
  align-items: center; padding: 1rem .6rem;
  gap: .6rem;
  background: var(--neutral);
  position: relative;
}
.center-label {
  font-family: 'Syne', sans-serif;
  font-size: .7rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted);
  text-align: center; padding-bottom: .3rem;
  border-bottom: 1px solid var(--border);
  width: 100%;
}
#wordBank {
  display: flex; flex-direction: column;
  gap: .45rem; width: 100%;
  align-items: center;
  overflow-y: auto;
  max-height: calc(100vh - 130px);
  padding-bottom: 1rem;
}

/* ── WORD CHIPS ── */
.word-chip {
  background: var(--chip-bg);
  color: var(--chip-text);
  border-radius: 8px;
  padding: .45rem 1rem;
  font-size: .88rem; font-weight: 600;
  cursor: grab; user-select: none;
  width: 100%; text-align: center;
  transition: transform .15s, box-shadow .15s, background .25s, color .25s;
  box-shadow: var(--shadow);
  border: 2px solid transparent;
  position: relative;
}
.word-chip:hover { transform: translateY(-2px); box-shadow: var(--shadow-lift); }
.word-chip:active { cursor: grabbing; transform: scale(1.05); }
.word-chip.dragging { opacity: .5; transform: scale(.95); }

.word-chip.correct-placed {
  background: var(--correct-bg);
  color: var(--correct);
  border-color: var(--correct);
  cursor: default;
}
.word-chip.correct-placed:hover { transform: none; box-shadow: var(--shadow); }

.word-chip.wrong-flash {
  background: var(--wrong-bg);
  color: var(--wrong);
  border-color: var(--wrong);
  animation: shake .4s ease;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(4px); }
}

/* ── COMPLETION BANNER ── */
#completeBanner {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,22,16,.75);
  backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
  z-index: 100;
}
#completeBanner.show { display: flex; }
.banner-card {
  background: var(--surface);
  border-radius: 24px;
  padding: 3rem 3.5rem;
  text-align: center;
  max-width: 440px;
  width: 90%;
  box-shadow: 0 24px 80px rgba(0,0,0,.4);
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn {
  from { transform: scale(.7); opacity: 0; }
  to   { transform: scale(1);  opacity: 1; }
}
.banner-card h2 {
  font-family: 'Syne', sans-serif;
  font-size: 2.5rem; font-weight: 800;
  line-height: 1; margin-bottom: .5rem;
}
.banner-card p { color: var(--muted); margin-bottom: 1.5rem; font-size: 1rem; }
.banner-score {
  font-family: 'Syne', sans-serif;
  font-size: 4rem; font-weight: 800;
  color: var(--correct); line-height: 1;
  margin-bottom: .4rem;
}
.banner-sub { color: var(--muted); font-size: .9rem; margin-bottom: 2rem; }
.btn-restart {
  background: var(--text); color: var(--bg);
  border: none; border-radius: 12px;
  padding: .9rem 2.5rem;
  font-family: 'Syne', sans-serif;
  font-size: 1rem; font-weight: 700; letter-spacing: 1px;
  cursor: pointer; transition: transform .15s, box-shadow .15s;
  box-shadow: 0 4px 20px rgba(0,0,0,.2);
}
.btn-restart:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,.3); }

/* mobile */
@media (max-width: 700px) {
  .arena {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
  }
  .col-left, .col-right { border: none; border-bottom: 1px solid var(--border); }
  .col-center { border-bottom: 1px solid var(--border); }
  #wordBank { flex-direction: row; flex-wrap: wrap; max-height: none; overflow: visible; justify-content: center; }
  .word-chip { width: auto; }
  .drop-zone { min-height: 80px; }
}
</style>
</head>
<body>

<header>
  <h1>📍 Sort the Vocabulary</h1>
  <div class="progress-info">
    <span class="prog-chip" id="progressText">0 / 0 placed</span>
    <span class="prog-chip" id="scoreText">✓ 0 correct</span>
  </div>
</header>

<div class="arena">

  <!-- LEFT: Elba -->
  <div class="col col-left">
    <div class="img-card">
      <img src="Felciaio-spiaggia-isola-elba.jpg" alt="Tuscan Archipelago"
           onerror="this.parentElement.style.background='linear-gradient(135deg,#0077b6,#00b4d8)';this.style.display='none'">
      <span class="img-badge elba">Tuscan Archipelago</span>
    </div>
    <span class="drop-label elba">Elba only →</span>
    <div class="drop-zone elba-zone" id="zone-elba"
         ondragover="onDragOver(event,'elba')"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event,'elba')">
      <span class="drop-hint">Drop words here</span>
    </div>
  </div>

  <!-- CENTER: Word Bank -->
  <div class="col-center">
    <div class="center-label">Words to sort</div>
    <div id="wordBank"></div>
  </div>

  <!-- RIGHT: Shetland -->
  <div class="col col-right">
    <div class="img-card">
      <img src="20230609_121825-980x458.webp" alt="Shetland Islands"
           onerror="this.parentElement.style.background='linear-gradient(135deg,#4a7c59,#2d6a4f)';this.style.display='none'">
      <span class="img-badge shet">Shetland Islands</span>
    </div>
    <span class="drop-label shet">← Shetland only</span>
    <div class="drop-zone shet-zone" id="zone-shetland"
         ondragover="onDragOver(event,'shetland')"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event,'shetland')">
      <span class="drop-hint">Drop words here</span>
    </div>
  </div>

</div>

<!-- Completion banner -->
<div id="completeBanner">
  <div class="banner-card">
    <div style="font-size:3rem;margin-bottom:.5rem">🎉</div>
    <h2>All Done!</h2>
    <p>You sorted every vocabulary word.</p>
    <div class="banner-score" id="finalScore">0</div>
    <div class="banner-sub" id="finalSub">correct placements</div>
    <button class="btn-restart" onclick="restartGame()">PLAY AGAIN</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  WORD DATA
//  zone: 'elba' | 'shetland'
// ══════════════════════════════════════════
const WORDS = [
  // ── ELBA ONLY ──
  { word: 'beach',       zone: 'elba' },
  { word: 'sand',        zone: 'elba' },
  { word: 'turquoise',   zone: 'elba' },
  { word: 'cove',        zone: 'elba' },
  { word: 'bay',         zone: 'elba' },
  { word: 'algae',       zone: 'elba' },
  { word: 'agave',       zone: 'elba' },
  { word: 'sunshine',    zone: 'elba' },
  { word: 'clear water', zone: 'elba' },
  { word: 'pebbles',     zone: 'elba' },
  { word: 'scrub',       zone: 'elba' },
  { word: 'flower',      zone: 'elba' },
  // ── SHETLAND ONLY ──
  { word: 'heather',     zone: 'shetland' },
  { word: 'stone wall',  zone: 'shetland' },
  { word: 'clouds',      zone: 'shetland' },
  { word: 'moor',        zone: 'shetland' },
  { word: 'overcast',    zone: 'shetland' },
  { word: 'peninsula',   zone: 'shetland' },
  { word: 'fjord',       zone: 'shetland' },
  { word: 'plateau',     zone: 'shetland' },
  { word: 'grey sea',    zone: 'shetland' },
  { word: 'pasture',     zone: 'shetland' },
  { word: 'headland',    zone: 'shetland' },
  { word: 'erosion',     zone: 'shetland' },
];

let draggingId = null;
let correctCount = 0;
let wrongAttempts = 0;
let totalPlaced = 0;

function shuffle(arr) {
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function buildBank() {
  const bank = document.getElementById('wordBank');
  bank.innerHTML = '';
  const shuffled = shuffle([...WORDS]);
  shuffled.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'word-chip';
    chip.id = 'chip-' + item.word.replace(/\s+/g,'-');
    chip.dataset.zone = item.zone;
    chip.dataset.word = item.word;
    chip.textContent = item.word;
    chip.draggable = true;
    chip.addEventListener('dragstart', onDragStart);
    chip.addEventListener('dragend',   onDragEnd);
    // Touch support
    chip.addEventListener('touchstart', onTouchStart, {passive:true});
    bank.appendChild(chip);
  });
  updateProgress();
}

function updateProgress() {
  document.getElementById('progressText').textContent = totalPlaced + ' / ' + WORDS.length + ' placed';
  document.getElementById('scoreText').textContent    = '✓ ' + correctCount + ' correct';
}

// ── DRAG & DROP ──
function onDragStart(e) {
  draggingId = e.target.id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) {
  e.target.classList.remove('dragging');
}
function onDragOver(e, zone) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const el = document.getElementById('zone-' + zone);
  el.classList.add('drag-over');
  if (zone === 'elba')     el.classList.add('elba-zone');
  if (zone === 'shetland') el.classList.add('shet-zone');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, zone) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!draggingId) return;
  const chip = document.getElementById(draggingId);
  if (!chip || chip.classList.contains('correct-placed')) return;
  handlePlace(chip, zone);
  draggingId = null;
}

function handlePlace(chip, zone) {
  const correctZone = chip.dataset.zone;

  if (zone === correctZone) {
    // ✅ Correct
    chip.classList.add('correct-placed');
    chip.draggable = false;
    chip.removeEventListener('dragstart', onDragStart);
    // Move chip into the drop zone
    const zoneEl = document.getElementById('zone-' + zone);
    removeDrophint(zoneEl);
    zoneEl.appendChild(chip);
    correctCount++;
    totalPlaced++;
  } else {
    // ❌ Wrong
    chip.classList.add('wrong-flash');
    wrongAttempts++;
    totalPlaced = Math.max(0, totalPlaced); // no change on wrong
    setTimeout(() => {
      chip.classList.remove('wrong-flash');
      // snap back to bank if not there already
      const bank = document.getElementById('wordBank');
      if (!bank.contains(chip)) bank.appendChild(chip);
    }, 500);
  }

  updateProgress();
  checkComplete();
}

function removeDrophint(zoneEl) {
  const hint = zoneEl.querySelector('.drop-hint');
  if (hint) hint.remove();
}

function checkComplete() {
  if (correctCount === WORDS.length) {
    setTimeout(showComplete, 600);
  }
}

function showComplete() {
  document.getElementById('finalScore').textContent = correctCount + '/' + WORDS.length;
  document.getElementById('finalSub').textContent = 'correct · ' + wrongAttempts + ' wrong attempt' + (wrongAttempts!==1?'s':'');
  document.getElementById('completeBanner').classList.add('show');
  launchConfetti();
}

function restartGame() {
  document.getElementById('completeBanner').classList.remove('show');
  correctCount = 0; wrongAttempts = 0; totalPlaced = 0;
  document.getElementById('zone-elba').innerHTML     = '<span class="drop-hint">Drop words here</span>';
  document.getElementById('zone-shetland').innerHTML = '<span class="drop-hint">Drop words here</span>';
  buildBank();
}

// ── TOUCH DRAG (mobile) ──
let touchChip = null, touchClone = null;

function onTouchStart(e) {
  touchChip = e.currentTarget;
  const touch = e.touches[0];
  const rect = touchChip.getBoundingClientRect();

  touchClone = touchChip.cloneNode(true);
  touchClone.style.cssText = `
    position:fixed; z-index:999; pointer-events:none; opacity:.85;
    width:${rect.width}px; left:${rect.left}px; top:${rect.top}px;
    transform:scale(1.08); transition:none;
  `;
  document.body.appendChild(touchClone);

  document.addEventListener('touchmove', onTouchMove, {passive:false});
  document.addEventListener('touchend',  onTouchEnd);
}

function onTouchMove(e) {
  e.preventDefault();
  const touch = e.touches[0];
  if (touchClone) {
    touchClone.style.left = (touch.clientX - touchClone.offsetWidth/2) + 'px';
    touchClone.style.top  = (touch.clientY - touchClone.offsetHeight/2) + 'px';
  }
}

function onTouchEnd(e) {
  document.removeEventListener('touchmove', onTouchMove);
  document.removeEventListener('touchend',  onTouchEnd);
  if (touchClone) { touchClone.remove(); touchClone = null; }
  if (!touchChip) return;

  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const zone = el?.closest('.drop-zone');
  if (zone) {
    const zoneId = zone.id.replace('zone-', '');
    if (!touchChip.classList.contains('correct-placed')) {
      handlePlace(touchChip, zoneId);
    }
  }
  touchChip = null;
}

// ── CONFETTI ──
function launchConfetti() {
  const colors = ['#0077b6','#4a7c59','#f5a623','#c1121f','#a78bfa','#ffc300'];
  for (let i=0; i<70; i++) {
    const el = document.createElement('div');
    el.style.cssText = `
      position:fixed; top:-12px; left:${Math.random()*100}vw;
      width:${7+Math.random()*7}px; height:${7+Math.random()*7}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      pointer-events:none; z-index:200;
      animation:fall ${1.5+Math.random()*2}s linear ${Math.random()*.6}s forwards;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', ()=>el.remove());
  }
}

const style = document.createElement('style');
style.textContent = `@keyframes fall { to { transform:translateY(110vh) rotate(540deg); opacity:0; } }`;
document.head.appendChild(style);

// ── INIT ──
buildBank();
</script>
</body>
</html>
